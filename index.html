<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Карта рассадки</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;800&family=Golos+Text:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <h1>Карта <span>рассадки</span></h1>
    <div class="rolebox" id="rolebox"></div>
  </div>

  <div id="banner"></div>

  <div class="tabs" id="tabs" role="tablist"></div>

  <div class="finder">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
    <input type="text" id="finder" placeholder="Найти студента по ФИО или группе…" autocomplete="off">
    <div class="suggest" id="suggest"></div>
  </div>

  <div class="room" id="room"></div>
  <div class="status" id="status"></div>
</div>

<div class="overlay" id="overlay">
  <div class="modal" id="modal"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js?v=20260603-code-first"></script>
</body>
</html>
